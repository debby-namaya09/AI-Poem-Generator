<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css"/>
    <title>AI Poem Generator</title>
</head>
<body>
    <div class="container">
      <header>
        <h1>AI Poem Generator</h1>
      </header>

      <main>
        <form>
          <input
            type="text"
            placeholder="Enter the topic of the poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />

          <input
            type="submit"
            value="Generate Poem"
            class="submit-button"
          />
        </form>

        <div class="poem">
          La tombe dit à la rose
          <br />
          Des pleurs dont l'aube t'arrose
        </div>
      </main>

      <footer>
        This AI project was coded by
        <a
          href="https://www.linkedin.com/in/deborah-muyongo-4143b2289"
          target="_blank"
        >
          Deborah Muyongo
        </a>
        and is open-sourced on
        <a href="https://github.com/debby-namaya09" target="_blank">
          GitHub
        </a>.
      </footer>
    </div>

    <script src="src/script.js"></script>
  </body>
</body>
</html>
